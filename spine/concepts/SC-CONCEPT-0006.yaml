notes: Initial three-artifact comparison suggested a real advantage in comparison stability, boundary preservation, and downstream reuse. The explicit scoring pass in `plans/symbolic_maps_level4_scoring_pass_v0.md` confirmed partial support, with Arm A beating Arm B on consistency, structural coverage, and reuse but not on raw round-trip reconstructability. The follow-on four-artifact pass in `plans/symbolic_maps_level4_scoring_pass_v1.md`, which added the semi-structured `starter_atlas.json`, strengthened that partial support rather than collapsing it. Arm A still wins on consistency, structural coverage, and downstream reuse, but broad hardening is still not yet earned.
