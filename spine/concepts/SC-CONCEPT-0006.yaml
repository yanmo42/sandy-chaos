next_test: use the v0 normalization sketch to answer a small cross-artifact comparison set and reject it if it needs repeated ad hoc slot growth or fails to improve comparison leverage over the prose extraction notes
next_action: keep the lane active under bounded pressure and test whether the new normalization sketch produces cleaner comparison behavior before attempting any broader validator/schema hardening
