notes: A compact Level-4 result packet exists, backed by null and ablation comparisons; the original key benchmark target was bidirectional corridor structure rather than raw paradox counts. A robustness pass in `plans/hyperstition_level4_robustness_pass_v0.md` showed that the Arm A corridor structure survives ±10% one-at-a-time parameter drift. The stronger temporal-driver comparator pass in `plans/hyperstition_level4_temporal_driver_comparison_v0.md` then reproduced bidirectional corridor coverage while removing current narrative state from the action channel, which weakens the uniqueness claim. The stricter boundary/sensitivity pass in `plans/hyperstition_level4_boundary_sensitivity_comparison_v0.md` found no clean separator under the configured criteria, so this lane remains proof-bearing but should not hold the active frontier slot without a newly motivated benchmark.
